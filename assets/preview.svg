    <text x="18" y="84" font-family="'Inter',Arial,sans-serif" font-size="11" fill="#d4d4d8">Based on my search, here are the top Python async patterns for 2026:</text>
    <text x="18" y="100" font-family="'Inter',Arial,sans-serif" font-size="11" fill="#a1a1aa">  • asyncio.TaskGroup for structured concurrency</text>
