    <text x="18" y="124" font-family="'Inter',Arial,sans-serif" font-size="10" fill="#52525b">  Sources: realpython.com · docs.python.org · github.com/python-trio</text>

    <!-- User message -->
    <rect x="460" y="150" width="220" height="36" rx="10" fill="#1f1f28" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1"/>
    <text x="570" y="172" text-anchor="middle" font-family="'Inter',Arial,sans-serif"
