    <!-- Code block response -->
    <rect x="0" y="200" width="680" height="160" rx="10" fill="#111118" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>
    <rect x="0" y="200" width="680" height="28" rx="10" fill="#1f1f28"/>
    <rect x="0" y="218" width="680" height="10" fill="#1f1f28"/>
    <text x="18" y="219" font-family="'Inter',Arial,sans-serif" font-size="9" fill="#52525b">python</text>
    <text x="640" y="219" font-family="'Inter',Arial,sans-serif" font-size="9" fill="#52525b">Copy</text>

    <text x="18" y="248" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" fill="#818cf8">import</text>
    <text x="62" y="248" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" fill="#d4d4d8"> asyncio</text>
    <text x="18" y="266" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" fill="#818cf8">async def</text>
    <text x="80" y="266" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" fill="#4ade80"> fetch_all</text>
    <text x="164" y="266" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" fill="#d4d4d8">(urls):</text>
    <text x="18" y="284" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" fill="#d4d4d8">    </text>
    <text x="36" y="284" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" fill="#818cf8">async with</text>
    <text x="118" y="284" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" fill="#d4d4d8"> asyncio.TaskGroup() </text>
    <text x="268" y="284" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" fill="#818cf8">as</text>
    <text x="286" y="284" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" fill="#d4d4d8"> tg:</text>
    <text x="18" y="302" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" fill="#71717a">        tasks = [tg.create_task(fetch(u)) for u in urls]</text>
    <text x="18" y="320" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="11" fill="#71717a">        return [t.result() for t in tasks]</text>
    <text x="18" y="350" font-family="'Inter',Arial,sans-serif" font-size="10" fill="#52525b">✦ 312 tokens · 48 t/s · gemma3:27b</text>
