<svg xmlns="http://www.w3.org/2000/svg" width="960" height="200" viewBox="0 0 960 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#18181f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="50"  x2="960" y2="50"/>
    <line x1="0" y1="100" x2="960" y2="100"/>
    <line x1="0" y1="150" x2="960" y2="150"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
  </g>

  <!-- Glowing orb -->
  <circle cx="820" cy="100" r="120" fill="#818cf8" opacity="0.04"/>
  <circle cx="820" cy="100" r="70"  fill="#818cf8" opacity="0.05"/>

  <!-- Left accent bar -->
  <rect x="48" y="58" width="4" height="84" rx="2" fill="url(#accent)"/>

  <!-- SURF wordmark -->
  <text x="68" y="118" font-family="'SF Mono','Fira Code',Consolas,monospace"
        font-size="58" font-weight="700" fill="url(#accent)" filter="url(#glow)"
        letter-spacing="-1">SURF</text>

  <!-- Tagline -->
  <text x="69" y="148" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="15" fill="#71717a" letter-spacing="4" font-weight="400">
    SEARCH · UNDERSTAND · REASON · FAST
  </text>

  <!-- Right pill badges -->
  <g transform="translate(580, 68)">
    <!-- Ollama -->
    <rect width="88" height="26" rx="13" fill="#1f1f28" stroke="#818cf8" stroke-width="1" stroke-opacity="0.4"/>
    <text x="44" y="17.5" text-anchor="middle" font-family="'Inter',Arial,sans-serif"
          font-size="11" fill="#818cf8" font-weight="600">🦙 Ollama</text>
  </g>
  <g transform="translate(676, 68)">
    <rect width="98" height="26" rx="13" fill="#1f1f28" stroke="#818cf8" stroke-width="1" stroke-opacity="0.4"/>
    <text x="49" y="17.5" text-anchor="middle" font-family="'Inter',Arial,sans-serif"
          font-size="11" fill="#818cf8" font-weight="600">✦ Anthropic</text>
  </g>
  <g transform="translate(782, 68)">
    <rect width="80" height="26" rx="13" fill="#1f1f28" stroke="#818cf8" stroke-width="1" stroke-opacity="0.4"/>
    <text x="40" y="17.5" text-anchor="middle" font-family="'Inter',Arial,sans-serif"
          font-size="11" fill="#818cf8" font-weight="600">⬡ OpenAI</text>
  </g>

  <!-- Feature pills row 2 -->
  <g transform="translate(580, 104)">
    <rect width="108" height="26" rx="13" fill="#1f1f28" stroke="#4ade80" stroke-width="1" stroke-opacity="0.4"/>
    <text x="54" y="17.5" text-anchor="middle" font-family="'Inter',Arial,sans-serif"
          font-size="11" fill="#4ade80" font-weight="600">🔍 Web Search</text>
  </g>
  <g transform="translate(696, 104)">
    <rect width="84" height="26" rx="13" fill="#1f1f28" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
    <text x="42" y="17.5" text-anchor="middle" font-family="'Inter',Arial,sans-serif"
          font-size="11" fill="#22d3ee" font-weight="600">🤖 Agent</text>
  </g>
  <g transform="translate(788, 104)">
    <rect width="74" height="26" rx="13" fill="#1f1f28" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.4"/>
    <text x="37" y="17.5" text-anchor="middle" font-family="'Inter',Arial,sans-serif"
          font-size="11" fill="#fbbf24" font-weight="600">⚡ Fast</text>
  </g>

  <!-- Bottom description -->
  <text x="69" y="174" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="13" fill="#52525b">
    Local-first AI chat · Free web search · Browser agent · Web UI + CLI · Python
  </text>
</svg>
